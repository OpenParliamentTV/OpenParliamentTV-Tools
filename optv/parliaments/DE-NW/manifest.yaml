    license: Landtag Nordrhein-Westfalen – die Aufzeichnungen dürfen zu nicht kommerziellen Zwecken (politische Berichterstattung, Bildung) genutzt werden; Quellenangabe "Landtag Nordrhein-Westfalen". https://www.landtag.nrw.de/home/footer/impressum.html
    creator: Landtag Nordrhein-Westfalen
    sourceURI: https://www.landtag.nrw.de/home/mediathek.html
