name: "Landtag Rheinland-Pfalz"
language: deu
language_code: "de"   # Stage-2 emission code (SHORTCODES.md §3)
locale:
  spacy_model: de_core_news_md
  aeneas_language: deu
  entityfishing_language: de
periods: [18]
supported_stages: [download, parse, merge, nel, align, ner]
# Aspirational - the dump may not exist on de-rp.openparliament.tv yet.
# Until it does, point --nel-data-dir at <data_dir>/metadata/entities.json
# (see scraper/build_entity_dump.py for how the placeholder is generated).
entity_dump_url: "https://de-rp.openparliament.tv/data/entity-dump/?type=all&wiki=true&exclude_document=true"
default_retry_count: 20
default_retry_delay_max: 10

