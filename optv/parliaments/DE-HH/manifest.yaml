name: "Hamburgische Bürgerschaft"
language: deu
language_code: "de"   # Stage-2 emission code (SHORTCODES.md §3)
locale:
  spacy_model: de_core_news_md
  aeneas_language: deu
  entityfishing_language: de
periods: [22, 23]
# `align` and `ner` deliberately omitted: the mediathek session pages carry a
# rich per-speech spine (per-TOP server-side HLS clips + per-speech start
# offsets and real wall-clock timestamps, the SE/DE-SH `#t=start,end` model) but
# the Plenarprotokoll is PDF-only (ParlDok) and we do not yet have a PDF parser.
# Without transcript text neither stage can produce meaningful output. The
# platform still imports the per-speech video windows with speaker / faction /
# agenda metadata. See DE-SH / DE-BY / DE-BW for the same regime.
supported_stages: [download, parse, merge, nel]
# Aspirational - the dump may not exist on de-hh.openparliament.tv yet.
# Until it does, scraper/build_entity_dump.py writes the local fallback
# at <data_dir>/metadata/entities.json.
entity_dump_url: "https://de-hh.openparliament.tv/data/entity-dump/?type=all&wiki=true&exclude_document=true"
default_retry_count: 20
default_retry_delay_max: 10

# Rights/source metadata (moved from code constants).
