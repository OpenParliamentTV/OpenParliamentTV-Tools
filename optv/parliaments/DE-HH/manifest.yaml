# via `optv.shared.pdf2tei` and joined onto that spine in the merger
# (`join_text_to_spine`), so `align` (aeneas, slicing each speech from its per-TOP
# HLS clip) and `ner` are wired. NB this text+align path is EXPERIMENTAL and
# UNVALIDATED — no Whisper-QC/text-fidelity audit has cleared it and it needs
# substantial refinement before platform integration.
