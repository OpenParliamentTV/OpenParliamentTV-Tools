name: "European Parliament"
language: eng
language_code: "en"   # Stage-2 emission code (SHORTCODES.md §3)
locale:
  spacy_model: en_core_web_md
  aeneas_language: eng
  entityfishing_language: en
periods: [10]
supported_stages: [download, parse, merge, align, nel, ner]
entity_dump_url: ""                     # local-file only until an EU OPTV platform
                                        # hosts a dump endpoint. Generated via
                                        # scraper/build_entity_dump.py → metadata/entities.json
default_retry_count: 10
default_retry_delay_max: 10

# NLP model installation (one-time, per host):
#   python -m spacy download en_core_web_md

# Rights/source metadata. EP texts and audiovisual material are reusable under
# © European Union; the legal notice carries the reuse terms (Decision
# 2011/833/EU). Proceedings text is the verbatim CRE; its original language is
# per-speech (multilingual) and stays data-driven in the parser.
media:
  default:
    creator: European Parliament
    license: https://www.europarl.europa.eu/legal-notice/en/
proceedings:
  default:
    creator: European Parliament
    license: https://www.europarl.europa.eu/legal-notice/en/
