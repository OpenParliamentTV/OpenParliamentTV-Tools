# m7k provides per-speech video with #t=start,end offsets on a session MP4. The
# Plenarprotokoll PDF is now parsed via `optv.shared.pdf2tei` and joined onto that
# spine in the merger (`join_text_to_spine`), so `align` (aeneas, slicing each
# speech from the session MP4) and `ner` are wired. NB this text+align path is
# EXPERIMENTAL and UNVALIDATED — no Whisper-QC/text-fidelity audit has cleared it
# and it needs substantial refinement before platform integration.
supported_stages: [download, parse, merge, nel, align, ner]
entity_dump_url: ""
default_retry_count: 20
default_retry_delay_max: 10

