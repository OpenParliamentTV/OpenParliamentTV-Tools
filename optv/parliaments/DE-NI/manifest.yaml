name: "Niedersächsischer Landtag"
language: deu
language_code: "de"   # Stage-2 emission code (SHORTCODES.md §3)
locale:
  spacy_model: de_core_news_md
  aeneas_language: deu
  entityfishing_language: de
periods: [19]
# The Plenar-TV API (api.plenartv.de) provides a rich per-speech spine
# (per-subject agenda + speaker timings into a per-Sitzung HLS stream + stable
# abg_id speaker IDs). Unlike the PDF-locked state parliaments, DE-NI's source
# exposes machine-readable text: time-aligned WebVTT subtitles per subject
# (GET /vtt/{subject_id}), parsed by parsers/vtt2json.py and attached onto the
# spine by speechIndex in the merger (attach_text_by_index). Because the VTT cues
# are already time-aligned, sentence timings come straight from the subtitles —
# `align` (aeneas) is NOT needed and deliberately stays unregistered; only `ner`
# is added. NB this VTT text path is EXPERIMENTAL and UNVALIDATED — no Whisper-QC
# / fidelity audit has cleared it (the per-subject VTT calibration is fragile) and
# it needs substantial refinement before platform integration.
supported_stages: [download, parse, merge, nel, ner]
# Aspirational — the hosted dump may not exist on de-ni.openparliament.tv yet.
# Until it does, scraper/build_entity_dump.py writes the local fallback at
# <data_dir>/metadata/entities.json (picked up by optv.shared.nel.get_nel_data).
entity_dump_url: "https://de-ni.openparliament.tv/data/entity-dump/?type=all&wiki=true&exclude_document=true"
default_retry_count: 20
default_retry_delay_max: 10

