name: "Sächsischer Landtag"
language: deu
language_code: "de"   # Stage-2 emission code (SHORTCODES.md §3)
locale:
  spacy_model: de_core_news_md
  aeneas_language: deu
  entityfishing_language: de
periods: [8]   # archive also covers WP 7; out of scope for v1
# `align` and `ner` deliberately omitted: the mediathek list carries a
# per-speech video spine (one daily HLS stream + per-speech start/end offsets,
# the SE/DE-SH/DE-BW `#t=start,end` model) but the Plenarprotokoll is PDF-only
# and we do not yet have a PDF parser. Without transcript text neither stage can
# produce meaningful output. The platform still imports the per-speech video
# windows with speaker / faction / agenda metadata. See DE-BW / DE-HH for the
# same regime.
supported_stages: [download, parse, merge, nel]
# Aspirational — the dump may not exist on de-sn.openparliament.tv yet. Until it
# does, scraper/build_entity_dump.py writes the local fallback at
# <data_dir>/metadata/entities.json.
entity_dump_url: "https://de-sn.openparliament.tv/data/entity-dump/?type=all&wiki=true&exclude_document=true"
default_retry_count: 20
default_retry_delay_max: 10

# Rights/source metadata (moved from code constants).
media:
  default:
    license: 'Sächsischer Landtag – die Aufzeichnungen dürfen zu nicht kommerziellen Zwecken (parlamentarische Berichterstattung, Bildung) genutzt werden; keine kommerzielle Verwendung. Quelle: Sächsischer Landtag. https://www.landtag.sachsen.de/de/mediathek-und-publikationen/nutzungsbedingungen-23697.cshtml'
    creator: Sächsischer Landtag
    sourceURI: https://www.landtag.sachsen.de/de/mediathek-und-publikationen/videos/plenarvideos/
