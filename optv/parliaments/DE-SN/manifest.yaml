periods: [8]   # archive also covers WP 7; out of scope for v1
# The mediathek list carries a per-speech video spine (one daily HLS stream +
# per-speech start/end offsets, the SE/DE-SH/DE-BW `#t=start,end` model; end
# offsets are clamped to the next start in media2json so the windows are
# disjoint). The Plenarprotokoll PDF is now parsed via `optv.shared.pdf2tei` and
# joined onto that spine in the merger (`join_text_to_spine`), so `align` (aeneas,
# slicing each speech from the daily HLS stream) and `ner` are wired. NB this
# text+align path is EXPERIMENTAL and UNVALIDATED — no Whisper-QC/text-fidelity
# audit has cleared it and it needs substantial refinement before platform
# integration.
supported_stages: [download, parse, merge, nel, align, ner]
entity_dump_url: ""
default_retry_count: 20
default_retry_delay_max: 10

