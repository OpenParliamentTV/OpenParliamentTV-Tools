name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # aeneas needs ffmpeg + espeak headers to build its native extension.
      # The test suite does not exercise aeneas, but it is in requirements.txt.
      - name: Install system dependencies for aeneas
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              ffmpeg espeak espeak-data libespeak1 libespeak-dev

      # Mirrors Conductor's Dockerfile: aeneas's setup.py imports numpy at
      # build-time and uses distutils.msvccompiler (removed in setuptools 72+),
      # so numpy + pinned setuptools must be installed first, with stdlib
      # distutils forced.
      - name: Install Python dependencies
        env:
          SETUPTOOLS_USE_DISTUTILS: stdlib
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<72" "numpy<2"
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q tests
