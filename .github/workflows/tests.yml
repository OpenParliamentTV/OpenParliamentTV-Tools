name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # The test suite does not exercise aeneas (sentence alignment) or
      # spacyfishing (NER) — those stages need external services anyway.
      # Skipping them cuts CI from ~3 min to ~30 s by avoiding numpy + C
      # extension builds. Production (Conductor's Dockerfile) installs the
      # full requirements.txt; this filter only affects CI.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v -E '^(aeneas|spacyfishing)\b' requirements.txt | pip install -r /dev/stdin

      # Byte-compile every .py file under optv/. Catches SyntaxError /
      # IndentationError everywhere.
      - name: Compile-check all Python sources
        run: python -m compileall -q -f optv

      # Smoke-import the modules whose heavy deps were skipped above. Their
      # imports are already lazy (aeneas inside _aeneas_worker, spacyfishing
      # only via spaCy's plugin discovery), so this catches NameError,
      # missing-import typos, and bad type annotations without installing
      # ~150 MB of build chain.
      - name: Smoke-import align.py and ner.py
        run: |
          python -c "import optv.shared.align"
          python -c "import optv.shared.ner"

      - name: Run pytest
        run: pytest -q tests
