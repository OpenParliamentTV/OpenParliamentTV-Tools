name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # aeneas needs ffmpeg + espeak headers to build its native extension.
      # The test suite does not exercise aeneas, but it is in requirements.txt.
      - name: Install system dependencies for aeneas
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              ffmpeg espeak espeak-data libespeak1 libespeak-dev

      # aeneas's setup.py imports numpy at build-time but doesn't declare it
      # in pyproject.toml's build-system.requires, so pip's isolated build env
      # doesn't see the numpy from the outer venv. Install aeneas with
      # --no-build-isolation against an outer venv that already has numpy.
      # SETUPTOOLS_USE_DISTUTILS=stdlib works around aeneas's reliance on
      # distutils.msvccompiler, which setuptools 72+ removed.
      - name: Install Python dependencies
        env:
          SETUPTOOLS_USE_DISTUTILS: stdlib
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<72" "numpy<2" wheel
          pip install --no-build-isolation aeneas==1.7.3.0
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q tests
